name: font_studio
description: تطبيق احترافي لتصميم الصور مع دعم كامل لخصائص OpenType
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Core UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_colorpicker: ^1.0.3
  
  # Image Processing
  image_picker: ^1.0.4
  image: ^4.1.3
  screenshot: ^2.1.0
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  permission_handler: ^11.0.1
  
  # OpenType & Font Parsing
  freetype_dart: ^0.0.5
  
  # State Management
  provider: ^6.1.1
  
  # File Management
  file_picker: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  
  # UI Components
  flutter_slidable: ^3.0.1
  reorderables: ^0.6.0
  matrix_gesture_detector: ^0.1.0
  
  # Utils
  uuid: ^4.2.1
  intl: ^0.18.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/icon/
    - assets/fonts/
    - assets/images/
    
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
