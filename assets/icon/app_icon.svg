<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#grad1)"/>
  
  <!-- Letter ف (Arabic Fa) -->
  <text x="256" y="320" 
        font-family="Arial, sans-serif" 
        font-size="280" 
        font-weight="bold"
        fill="white" 
        text-anchor="middle">ف</text>
  
  <!-- Decorative dots -->
  <circle cx="150" cy="380" r="15" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="362" cy="380" r="15" fill="url(#grad2)" opacity="0.8"/>
  
  <!-- Small accent -->
  <rect x="230" y="100" width="52" height="8" rx="4" fill="white" opacity="0.5"/>
</svg>
